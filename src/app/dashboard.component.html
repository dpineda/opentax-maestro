<div class="dashboard-layout">
  <aside class="sidebar">
    <nav class="wizard-nav">
      <ul>
        <li *ngFor="let step of steps; let i = index" [class.active]="i === currentStep" (click)="goToStep(i)">
          <span class="step-icon">{{ step.icon }}</span>
          <span class="step-label">{{ step.label }}</span>
        </li>
      </ul>
    </nav>
  </aside>
  <dashboard-header/>
  <section class="dashboard-content">    
    <ng-container [ngSwitch]="currentStep">
      <div *ngSwitchCase="0">
        <h2>Overview</h2>
        <p>Welcome to your dashboard. Here you can see a summary of your activity.</p>
      </div>
      <div *ngSwitchCase="1">
        <h2>Profile</h2>
        <p>Update your profile information here.</p>
      </div>
      <div *ngSwitchCase="2">
        <h2>Documents</h2>
        <p>Manage your documents and uploads.</p>
      </div>
      <div *ngSwitchCase="3">
        <h2>Review</h2>
        <p>Review and finalize your details.</p>
      </div>
    </ng-container>
  </section>
</div>
